services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.dockerfile
      target: builder
    command: npm run start:dev
    environment:
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.dockerfile
      target: builder
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
